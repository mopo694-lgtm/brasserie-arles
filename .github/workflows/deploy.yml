name: Déploiement sur Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ftp-deploy:
    name: Envoi FTP vers Hostinger
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Déployer via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          # Adapter ce chemin à la structure réelle de l'hébergement Hostinger
          # (souvent "public_html/" pour le domaine principal)
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
